{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container">
        <h2>Edit Student</h2>

        <p style="text-align: center; color: #374151; margin-bottom: 20px;">
            Logged in as: <strong>{{ username }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}

            <label>Name:</label>
            <input type="text" name="name" value="{{ student.name }}" required>


            <label>Department:</label>
            <select name="department" required>
                <option value="CSE" {% if student.department == "CSE" %}selected{% endif %}>CSE</option>
<option value = "IT" {% if student.department == "IT" %}selected{% endif %}>IT</option>
<option value = "ECE" {% if student.department == "ECE" %}selected{% endif %}>ECE</option>
<option value = "EEE" {% if student.department == "EEE" %}selected{% endif %}>EEE</option>
<option value = "MECH" {% if student.department == "MECH" %}selected{% endif %}>MECH</option>
<option value = "CIVIL" {% if student.department == "CIVIL" %}selected{% endif %}>CIVIL</option>
<option value = "AIDS" {% if student.department == "AIDS" %}selected{% endif %}>AIDS</option>
            </select>

            <label>Age:</label>
            <input type="number" name="age" value="{{ student.age }}" required>

            <label>Roll No:</label>
            <input type="text" name="roll_no" value="{{ student.roll_no }}" required>

            <label for="email">E-Mail:</label>
            <input type="email" name="email" value="{{ student.email }}" required pattern="^[a-z0-9]+@gmail\.com$">
            <button type="submit">Update</button>
        </form>

        <div class="top-buttons">
            <a href="/students/" class="main-btn">Back to Student List</a>
            <a href="/logout/" class="main-btn logout-btn">Logout</a>
        </div>
    </div>
</body>

</html>
